name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build release
        run: swift build -c release

      - name: Build app bundle
        run: make

      - name: Verify bundle
        run: test -d build/EyeBreak.app && echo "Bundle built successfully"
